apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-service-account
  namespace: prod-apps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader
  namespace: prod-apps
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: read-pods-binding
  namespace: prod-apps
subjects:
- kind: ServiceAccount
  name: app-service-account
  namespace: prod-apps
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io # 🟢 Corrigé : le "/v1" a été retiré ici