name: CI - Build and Push Containers

# Déclencheur : On lance le script à chaque fois qu'on fait un "git push"
on:
  push:
    branches: [ "main" ]

jobs:
  # 🔍 JOB 1 : L'inspecteur SonarCloud (S'exécute en premier)
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Obligatoire pour que SonarCloud analyse l'historique

      # 1. On installe Java sur la machine virtuelle pour pouvoir compiler
      - name: Configurer JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 2. On compile le backend pour générer les fichiers .class demandés par Sonar
      - name: Compiler le Backend Java
        run: mvn -file backend/backend/pom.xml compile

      # 3. On lance le scan sécurisé (SHA) avec l'accès aux librairies compilées
      - name: Scanner le code avec SonarCloud
        # uses: sonarsource/sonarcloud-github-action@eb21172322312ac6a64f33b1fdb56e792e31969a
        uses: sonarsource/sonarcloud-github-action@eb21172322312ac6a64f33b1fdb56e792e31969a
        with:
          args: >
            -Dsonar.organization=salahsaa
            -Dsonar.projectKey=Salahsaa_mon-projet-docker
            -Dsonar.java.binaries=backend/backend/target/classes
            -Dsonar.java.libraries=/home/runner/.m2/repository/**/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 🚀 JOB 2 : S'occupe du Frontend Angular (Attend SonarCloud)
  build-frontend:
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push du Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frantend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mon-frontend:latest

  # ☕ JOB 3 : S'occupe du Backend Java/Maven (Attend SonarCloud)
  build-backend:
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push du Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mon-backend:latest