name: CI - Build and Push Containers

# Déclencheur : On lance le script à chaque fois qu'on fait un "git push"
on:
  push:
    branches: [ "main" ]

jobs:
  # JOB 1 : S'occupe du Frontend Angular
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push du Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frantend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mon-frontend:latest

  # JOB 2 : S'occupe du Backend Java/Maven (s'exécute en parallèle)
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et Push du Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend/backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mon-backend:latest